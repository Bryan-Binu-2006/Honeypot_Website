{% extends "base.html" %}

{% block title %}Settings - CyberShield Admin{% endblock %}

{% block content %}
{% include 'admin/nav.html' %}

<h1 style="margin-bottom: 2rem;">Settings</h1>

<div class="card">
    <h3>General Settings</h3>
    <form>
        <div>
            <label style="display: block; margin-bottom: 0.5rem; color: #999;">Site Name</label>
            <input type="text" value="CyberShield Security Platform">
        </div>
        <div>
            <label style="display: block; margin-bottom: 0.5rem; color: #999;">Admin Email</label>
            <input type="email" value="admin@cybershield.local">
        </div>
        <div>
            <label style="display: block; margin-bottom: 0.5rem; color: #999;">Timezone</label>
            <select>
                <option>UTC</option>
                <option selected>America/Los_Angeles</option>
                <option>America/New_York</option>
                <option>Europe/London</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Settings</button>
    </form>
</div>

<div class="card" style="margin-top: 1rem;">
    <h3>Security Settings</h3>
    <form>
        <div style="margin-bottom: 1rem;">
            <label style="display: flex; align-items: center; color: #999; cursor: pointer;">
                <input type="checkbox" checked style="width: auto; margin-right: 0.5rem;">
                Enable Two-Factor Authentication
            </label>
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: flex; align-items: center; color: #999; cursor: pointer;">
                <input type="checkbox" checked style="width: auto; margin-right: 0.5rem;">
                Require Strong Passwords
            </label>
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: flex; align-items: center; color: #999; cursor: pointer;">
                <input type="checkbox" style="width: auto; margin-right: 0.5rem;">
                Enable IP Whitelisting
            </label>
        </div>
        <button type="submit" class="btn btn-primary">Save Security Settings</button>
    </form>
</div>
{% endblock %}
