{% extends "base.html" %}

{% block title %}Sign Up - CyberShield{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
        
        <form method="POST" action="/signup">
            <div>
                <label for="name" style="display: block; margin-bottom: 0.5rem; color: #999;">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            
            <div>
                <label for="email" style="display: block; margin-bottom: 0.5rem; color: #999;">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@company.com">
            </div>
            
            <div>
                <label for="company" style="display: block; margin-bottom: 0.5rem; color: #999;">Company</label>
                <input type="text" id="company" name="company" placeholder="Your Company">
            </div>
            
            <div>
                <label for="password" style="display: block; margin-bottom: 0.5rem; color: #999;">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a strong password">
            </div>
            
            <div>
                <label for="confirm_password" style="display: block; margin-bottom: 0.5rem; color: #999;">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm password">
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label style="display: flex; align-items: center; color: #999; cursor: pointer;">
                    <input type="checkbox" name="terms" required style="width: auto; margin-right: 0.5rem;">
                    I agree to the <a href="/terms" style="color: #00d4ff; margin-left: 0.25rem;">Terms of Service</a>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>
        
        <div style="text-align: center; margin-top: 2rem; color: #999;">
            Already have an account? <a href="/login" style="color: #00d4ff;">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
