{% extends "base.html" %}

{% block title %}Web Terminal - CyberShield Admin{% endblock %}

{% block content %}
<h1 style="margin-bottom: 2rem;">Web Terminal</h1>

<div class="card" style="background: #0d0d0d; font-family: 'Courier New', monospace;">
    <div id="terminal-output" style="height: 400px; overflow-y: auto; padding: 1rem; white-space: pre-wrap; color: #00ff00;">
Welcome to CyberShield Terminal v1.0
Type 'help' for available commands.

www-data@web-01:/var/www/cybershield$ </div>
    
    <div style="display: flex; gap: 0.5rem; padding: 1rem; border-top: 1px solid #333;">
        <span style="color: #00ff00;">$</span>
        <input type="text" id="terminal-input" style="flex: 1; background: transparent; border: none; color: #00ff00; outline: none; font-family: inherit;" placeholder="Enter command...">
        <button onclick="executeCommand()" class="btn btn-primary">Execute</button>
    </div>
</div>

<div class="card" style="margin-top: 1rem;">
    <h3>Quick Commands</h3>
    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
        <button onclick="runQuickCmd('id')" class="btn" style="background: rgba(0,212,255,0.2); color: #00d4ff;">id</button>
        <button onclick="runQuickCmd('whoami')" class="btn" style="background: rgba(0,212,255,0.2); color: #00d4ff;">whoami</button>
        <button onclick="runQuickCmd('pwd')" class="btn" style="background: rgba(0,212,255,0.2); color: #00d4ff;">pwd</button>
        <button onclick="runQuickCmd('ls -la')" class="btn" style="background: rgba(0,212,255,0.2); color: #00d4ff;">ls -la</button>
        <button onclick="runQuickCmd('cat /etc/passwd')" class="btn" style="background: rgba(0,212,255,0.2); color: #00d4ff;">cat /etc/passwd</button>
        <button onclick="runQuickCmd('ps aux')" class="btn" style="background: rgba(0,212,255,0.2); color: #00d4ff;">ps aux</button>
        <button onclick="runQuickCmd('env')" class="btn" style="background: rgba(0,212,255,0.2); color: #00d4ff;">env</button>
    </div>
</div>

<script>
const output = document.getElementById('terminal-output');
const input = document.getElementById('terminal-input');

input.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        executeCommand();
    }
});

function executeCommand() {
    const cmd = input.value;
    if (!cmd) return;
    
    // Show command in output
    output.innerHTML += cmd + '\n';
    
    // Send to server
    fetch('/terminal/exec', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'cmd=' + encodeURIComponent(cmd)
    })
    .then(response => response.json())
    .then(data => {
        output.innerHTML += data.output + '\n\nwww-data@web-01:/var/www/cybershield$ ';
        output.scrollTop = output.scrollHeight;
    })
    .catch(error => {
        output.innerHTML += 'Error: ' + error + '\n\nwww-data@web-01:/var/www/cybershield$ ';
    });
    
    input.value = '';
}

function runQuickCmd(cmd) {
    input.value = cmd;
    executeCommand();
}
</script>
{% endblock %}
