{% extends "base.html" %}

{% block title %}Contact - CyberShield{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <h1 style="margin-bottom: 2rem; text-align: center;">Contact Us</h1>
    
    <div class="card">
        <form method="POST" action="/contact">
            <div>
                <label for="name" style="display: block; margin-bottom: 0.5rem; color: #999;">Your Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            
            <div>
                <label for="email" style="display: block; margin-bottom: 0.5rem; color: #999;">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>
            
            <div>
                <label for="subject" style="display: block; margin-bottom: 0.5rem; color: #999;">Subject</label>
                <input type="text" id="subject" name="subject" required placeholder="How can we help?">
            </div>
            
            <div>
                <label for="message" style="display: block; margin-bottom: 0.5rem; color: #999;">Message</label>
                <textarea id="message" name="message" rows="5" required placeholder="Your message..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
