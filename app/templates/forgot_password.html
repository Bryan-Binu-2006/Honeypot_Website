{% extends "base.html" %}

{% block title %}Forgot Password - CyberShield{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1rem;">Reset Password</h2>
        <p style="text-align: center; color: #999; margin-bottom: 2rem;">Enter your email address and we'll send you a link to reset your password.</p>
        
        <form method="POST" action="/forgot-password">
            <div>
                <label for="email" style="display: block; margin-bottom: 0.5rem; color: #999;">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
        </form>
        
        <div style="text-align: center; margin-top: 2rem; color: #999;">
            Remember your password? <a href="/login" style="color: #00d4ff;">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
