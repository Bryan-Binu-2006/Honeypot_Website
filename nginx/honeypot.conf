# Nginx configuration for honeypot web application.
#
# Replace honeypot.example.com with your real domain before enabling.

upstream honeypot_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP listener: keep ACME challenge path open, redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name honeypot.example.com www.honeypot.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS listener serving the honeypot app.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name honeypot.example.com www.honeypot.example.com;

    # Certbot default paths (LetsEncrypt).
    ssl_certificate /etc/letsencrypt/live/honeypot.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/honeypot.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://honeypot_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location /static/ {
        alias /var/www/honeypot/app/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location /nginx-health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    access_log /var/log/nginx/honeypot_access.log;
    error_log /var/log/nginx/honeypot_error.log;
}
